name: mooindagcounter

services:
  db:
    image: mariadb:12.2
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: mooindagcounter
      MARIADB_USER: mooindagcounter
      MARIADB_PASSWORD: ${DB_PASSWORD:-example}
    volumes:
      - db_data:/var/lib/mysql
      - ./src/create_db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./src
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: mooindagcounter
      DB_USER: mooindagcounter
      DB_PASSWORD: ${DB_PASSWORD:-example}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
