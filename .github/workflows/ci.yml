name: Code kwaliteit en veiligheidsscans

# Draait bij elke push naar main en bij pull requests.
# Zo worden problemen gevangen voordat ze in productie belanden.
on:
  push:
    branches: [main]
    paths:
      - "microservices/**"
      - "bunny-libsql/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "microservices/**"
      - "bunny-libsql/**"
      - ".github/workflows/ci.yml"

jobs:

  # --- Variant-synchronisatie ---
  # web/app.py, templates/ en static/ horen byte-voor-byte identiek te zijn
  # tussen beide varianten; alleen de datalaag (web/db.py), requirements en
  # de entrypoint mogen verschillen. Deze check voorkomt dat een fix in de
  # ene variant de andere stilletjes mist.
  variant-sync:
    name: Varianten synchroon (app.py, templates, static)
    runs-on: ubuntu-latest
    steps:
      - name: Haal broncode op
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Vergelijk gedeelde bestanden tussen de varianten
        run: |
          diff microservices/web/app.py bunny-libsql/web/app.py
          diff -r microservices/web/templates bunny-libsql/web/templates
          diff -r microservices/web/static bunny-libsql/web/static

  # --- Linting ---
  # Controleert Python-code op stijl- en kwaliteitsfouten met Ruff.
  # Ruff is de moderne vervanger van flake8/pylint en is aanzienlijk sneller.
  lint:
    name: Linting (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Haal broncode op
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Stel Python in
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"

      - name: Installeer Ruff
        run: pip install ruff

      - name: Voer Ruff uit
        # Controleert stijl en importvolgorde; geeft een fout bij overtredingen.
        run: ruff check microservices/web/ bunny-libsql/web/

  # --- Statische beveiligingsanalyse (SAST) ---
  # Bandit scant Python-broncode op veelvoorkomende beveiligingsproblemen,
  # zoals SQL-injectie, hardgecodeerde wachtwoorden en onveilige aanroepen.
  bandit:
    name: Beveiligingsanalyse broncode (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Haal broncode op
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Stel Python in
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"

      - name: Installeer Bandit
        run: pip install bandit

      - name: Voer Bandit uit
        # -ll toont alleen medium- en high-severity bevindingen om ruis te beperken.
        run: bandit -r microservices/web/ bunny-libsql/web/ -ll

  # --- Kwetsbaarheidsscan Python-afhankelijkheden ---
  # pip-audit vergelijkt requirements.txt met de PyPA Advisory Database (GHSA/CVE).
  # Geeft een fout als een afhankelijkheid een bekende kwetsbaarheid heeft.
  pip-audit:
    name: Kwetsbaarheidsscan dependencies (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Haal broncode op
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Stel Python in
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"

      - name: Installeer pip-audit
        run: pip install pip-audit

      - name: Scan dependencies op kwetsbaarheden
        run: pip-audit -r microservices/web/requirements.txt -r bunny-libsql/web/requirements.txt

  # --- Container image scan ---
  # Trivy bouwt het Docker-image en scant het op bekende CVE's in
  # zowel OS-pakketten (Debian/Alpine) als Python-afhankelijkheden.
  # Resultaten worden als SARIF geupload naar GitHub Security (tabblad "Security > Code scanning").
  trivy:
    name: Container image scan (Trivy, ${{ matrix.variant }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # Nodig voor het uploaden van SARIF naar GitHub Security.
      contents: read
    strategy:
      matrix:
        include:
          - variant: microservices
            context: ./microservices/web
          - variant: bunny-libsql
            context: ./bunny-libsql/web
    steps:
      - name: Haal broncode op
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Bouw Docker image voor scan
        run: docker build -t scan-target:ci ${{ matrix.context }}

      - name: Scan image met Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: scan-target:ci
          format: sarif
          output: trivy-results.sarif
          # Geef alleen een fout bij HIGH en CRITICAL kwetsbaarheden; niet-blokkeerbaar op PRs.
          severity: HIGH,CRITICAL
          exit-code: ${{ github.event_name == 'push' && '1' || '0' }}
          ignore-unfixed: true   # Sla kwetsbaarheden over waarvoor nog geen fix beschikbaar is.

      - name: Upload Trivy-resultaten naar GitHub Security
        # Sla over als Code Scanning niet beschikbaar is (bijv. geen GitHub Advanced Security).
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        with:
          sarif_file: trivy-results.sarif
          # Eigen categorie per variant zodat de resultaten elkaar niet overschrijven.
          category: trivy-${{ matrix.variant }}
