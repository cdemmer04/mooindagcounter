name: Build & Push to GHCR

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

jobs:
  build-push:
    name: Build and push ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: mooindagcounter-web
            context: ./src/web
          - image: mooindagcounter-db
            context: ./src/db

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Log in to GitHub Container Registry
        # Only log in when we're actually going to push (i.e. not a fork)
        if: github.repository == github.event.repository.full_name && !github.event.repository.fork
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: ${{ matrix.context }}
          # Only push when running from the canonical (non-forked) repo.
          # Forks lack write:packages permission for foreign GHCR namespaces.
          push: ${{ !github.event.repository.fork }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
