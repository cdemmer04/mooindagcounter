<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="icon" type="image/png" href="/static/" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="shortcut icon" href="/static/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Mooindagcounter" />
    <link rel="manifest" href="/site.webmanifest" />
</head>

<body>
    <div class="container">
        <h1>Mooindag counter</h1>
        <h2>{{ counter }}</h2>
        <form action="/increment" method="post">
            <!-- Aangepast input veld voor bericht -->
            <input maxlength="200" type="text" name="message" placeholder="Voer hier een bericht in" required="true">
            <button type="submit">Increment</button>
        </form>
        <form action="/overview" method="get">
            <button type="submit">Overview</button>
        </form>

        <form action="https://status.mooindagcounter.nl" method="get">
            <button type="submit">Status</button>
        </form>

        <div class="footer">Copyright Mooindagcounter</div> 
    </div>
</body>

</html>
