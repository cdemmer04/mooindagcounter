<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mooindag Counter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon/favicon-96x96.png') }}" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon/favicon.svg') }}" />
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon/favicon.ico') }}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='img/favicon/apple-touch-icon.png') }}" />
    <meta name="apple-mobile-web-app-title" content="Mooindagcounter" />
    <link rel="manifest" href="{{ url_for('static', filename='img/favicon/site.webmanifest') }}" />
</head>

<!-- Mooindag! -->
<body class="d-flex align-items-center min-vh-100">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-5">
                <div class="card shadow text-center p-4">
                    <h1 class="fs-1 mb-2">Mooindag counter</h1>
                    <h2 class="fs-3 text-secondary mb-4">{{ counter }}</h2>

                    {% if error_message == "empty" %}
                    <p class="text-danger">Voer een bericht in!</p>
                    {% elif error_message == "duplicate" %}
                    <p class="text-danger">Dit bericht bestaat al!</p>
                    {% elif error_message == "too_long" %}
                    <p class="text-danger">Bericht mag maximaal 300 tekens bevatten!</p>
                    {% endif %}

                    <form action="/increment" method="post" class="mt-3">
                        <input class="form-control mb-3" maxlength="300" type="text" name="message" placeholder="Voer hier een bericht in" aria-label="Bericht voor de teller" required>
                        <button type="submit" class="btn btn-success w-100">Increment</button>
                    </form>

                    <form action="{{ url_for('overview') }}" method="get" class="mt-2">
                        <button type="submit" class="btn btn-success w-100">Overzicht</button>
                    </form>

                    <form action="https://uptime.stensel.nl/status/mooindag" method="get" class="mt-2">
                        <button type="submit" class="btn btn-success w-100">Status</button>
                    </form>

                    <div class="mt-4 text-muted small">Copyright Mooindagcounter</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
