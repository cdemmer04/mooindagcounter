# Voorbeeld-secret. NIET met echte wachtwoorden committen!
#
# Optie 1: kopieer naar secret.yaml (staat in .gitignore), vul in en apply.
# Optie 2: maak het secret direct aan zonder bestand:
#
#   kubectl -n mooindagcounter create secret generic mooindagcounter-db \
#     --from-literal=MARIADB_ROOT_PASSWORD='kies-een-sterk-wachtwoord' \
#     --from-literal=DB_PASSWORD='kies-een-ander-sterk-wachtwoord'
apiVersion: v1
kind: Secret
metadata:
  name: mooindagcounter-db
  namespace: mooindagcounter
type: Opaque
stringData:
  MARIADB_ROOT_PASSWORD: vervang-mij
  DB_PASSWORD: vervang-mij-ook
