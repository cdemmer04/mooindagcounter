# De web-laag is stateless en mag daarom vrij horizontaal schalen:
# alle replicas praten met dezelfde database (Service "db"), dus elke
# bezoeker ziet dezelfde teller, ongeacht welke pod het request afhandelt.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mooindag-web
  template:
    metadata:
      labels:
        app: mooindag-web
    spec:
      containers:
        - name: web
          image: ghcr.io/stensel8/mooindag-web:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_HOST
              value: db
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: mooindagcounter
            - name: DB_USER
              value: mooindagcounter
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mooindag-db
                  key: DB_PASSWORD
            - name: GUNICORN_WORKERS
              value: "2"
          # Readiness op /: geeft 503 zolang de database onbereikbaar is,
          # dus zo'n pod krijgt geen verkeer maar blijft wel draaien.
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          # Liveness bewust alleen een TCP-check (leeft gunicorn nog?):
          # een HTTP-check zou bij een database-storing gezonde web-pods
          # in een herstart-loop trekken.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          # Zelfde hardening als in docker-compose: read-only rootfs
          # met een schrijfbare tmpfs voor gunicorn.
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
