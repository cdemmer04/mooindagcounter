<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mooindag Counter</title>
    <link rel="stylesheet" href="{{ url_for('static', path='bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">

    <link rel="icon" type="image/png" href="{{ url_for('static', path='img/favicon/favicon-96x96.png') }}" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='img/favicon/favicon.svg') }}" />
    <link rel="shortcut icon" href="{{ url_for('static', path='img/favicon/favicon.ico') }}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', path='img/favicon/apple-touch-icon.png') }}" />
    <meta name="apple-mobile-web-app-title" content="Mooindagcounter" />
    <link rel="manifest" href="{{ url_for('static', path='img/favicon/site.webmanifest') }}" />
</head>

<!-- Mooindag! -->
<body class="d-flex align-items-center min-vh-100">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-5">
                <div class="card shadow text-center p-4">
                    <h1 class="fs-1 mb-2">Mooindag counter</h1>
                    <h2 id="teller" class="fs-3 text-secondary mb-4">{{ counter }}</h2>

                    <!-- Aftelklokken: de afstudeerperiode (1 feb t/m 4 juli 2027) en het
                         einde van de studie. Styling-aanvullingen inline, want app.css
                         wordt door de CDN gecachet en mag niet uit de pas lopen. -->
                    <style>
                    .aftelklok .afstudeer-vak { min-width: 3.4rem; padding: 0.4rem 0.3rem; }
                    .aftelklok .afstudeer-getal { font-size: 1.35rem; }
                    .afstudeer-sub { font-size: .8rem; opacity: .85; margin-bottom: .4rem; }
                    </style>

                    <div class="afstudeer aftelklok mb-3" data-begin="2027-02-01T00:00:00+01:00" data-eind="2027-07-04T23:59:59+02:00">
                        <div class="afstudeer-titel" aria-live="polite">Afstudeercounter</div>
                        <div class="afstudeer-sub" data-rol="status">--</div>
                        <div class="afstudeer-klok"></div>
                    </div>

                    <div class="afstudeer aftelklok mb-4" data-eind="2027-07-04T23:59:59+02:00">
                        <div class="afstudeer-titel" aria-live="polite">Studieklaarcounter</div>
                        <div class="afstudeer-klok"></div>
                    </div>

                    <!-- Server-gerenderde fout (formulier-post zonder JS); de tekst
                         komt uit FOUTTEKSTEN in app.py, net als bij het fetch-pad,
                         dat #live-fout hieronder gebruikt. -->
                    {% if error_message %}
                    <p class="text-danger">{{ error_message }}</p>
                    {% endif %}
                    <p id="live-fout" class="text-danger d-none"></p>

                    <form id="increment-form" action="/increment" method="post" class="mt-3">
                        <input class="form-control mb-3" maxlength="300" type="text" name="message" placeholder="Voer hier een bericht in" aria-label="Bericht voor de teller" required>
                        <button type="submit" class="btn btn-success w-100">Increment</button>
                    </form>

                    <a href="{{ url_for('overview') }}" class="btn btn-success w-100 mt-2">Overzicht</a>

                    <div class="mt-4 text-muted small">Copyright Mooindagcounter</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Aftelklokken; volledig client-side. Een klok met data-begin telt
         eerst af naar het begin ("begint over") en daarna naar het einde
         ("bezig! klaar over"); zonder data-begin telt hij alleen af naar
         het einde. Tikt op de minuutgrens (er staan geen seconden in beeld)
         en stopt helemaal zodra alle klokken klaar zijn. -->
    <script>
    (function () {
        const LABELS = ["dagen", "uren", "minuten"];
        const klokken = [];

        for (const el of document.querySelectorAll(".aftelklok")) {
            const klok = el.querySelector(".afstudeer-klok");
            const getallen = [];
            for (const label of LABELS) {
                const vak = document.createElement("div");
                vak.className = "afstudeer-vak";
                const getal = document.createElement("span");
                getal.className = "afstudeer-getal";
                getal.textContent = "--";
                const tekst = document.createElement("span");
                tekst.className = "afstudeer-label";
                tekst.textContent = label;
                vak.append(getal, tekst);
                klok.appendChild(vak);
                getallen.push(getal);
            }
            klokken.push({
                getallen,
                titel: el.querySelector(".afstudeer-titel"),
                status: el.querySelector('[data-rol="status"]'),
                begin: el.dataset.begin ? new Date(el.dataset.begin).getTime() : null,
                eind: new Date(el.dataset.eind).getTime(),
            });
        }

        function toon(k, diff) {
            const s = Math.max(0, Math.floor(diff / 1000));
            const delen = [Math.floor(s / 86400), Math.floor(s / 3600) % 24, Math.floor(s / 60) % 60];
            delen.forEach((deel, i) => { k.getallen[i].textContent = deel; });
        }

        function tick() {
            const nu = Date.now();
            let klaar = true;
            for (const k of klokken) {
                if (nu >= k.eind) {
                    toon(k, 0);
                    k.titel.textContent = "🎉 Afgestudeerd!";
                    if (k.status) k.status.textContent = "";
                } else {
                    klaar = false;
                    const naarBegin = k.begin !== null && nu < k.begin;
                    if (k.status) k.status.textContent = naarBegin ? "begint over" : "bezig! klaar over";
                    toon(k, (naarBegin ? k.begin : k.eind) - nu);
                }
            }
            return klaar;
        }

        // Plan de volgende tik net na de minuutgrens; klaar = geen timers meer.
        function plan() {
            if (tick()) return;
            setTimeout(plan, 60050 - (Date.now() % 60000));
        }
        plan();
    })();
    </script>

    {% include "_live.html" %}
</body>

</html>
