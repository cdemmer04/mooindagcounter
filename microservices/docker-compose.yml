name: mooindagcounter

services:
  db:
    build:
      context: ./db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: mooindagcounter
      MARIADB_USER: mooindagcounter
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./web
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: mooindagcounter
      DB_USER: mooindagcounter
      DB_PASSWORD: ${DB_PASSWORD}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp

volumes:
  db_data:
